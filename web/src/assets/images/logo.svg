<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变圆形 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a6cf7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#f8faff;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- 主背景 -->
  <circle cx="20" cy="20" r="18" fill="url(#bgGradient)" stroke="#3b4ef0" stroke-width="0.5"/>
  
  <!-- 知识库书本图标 -->
  <g transform="translate(10, 8)">
    <!-- 书本主体 -->
    <rect x="2" y="4" width="16" height="20" rx="1.5" fill="url(#bookGradient)" stroke="#4a6cf7" stroke-width="0.3"/>
    
    <!-- 书本页面线条 -->
    <line x1="5" y1="8" x2="15" y2="8" stroke="#4a6cf7" stroke-width="0.8" opacity="0.6"/>
    <line x1="5" y1="11" x2="13" y2="11" stroke="#4a6cf7" stroke-width="0.8" opacity="0.6"/>
    <line x1="5" y1="14" x2="14" y2="14" stroke="#4a6cf7" stroke-width="0.8" opacity="0.6"/>
    <line x1="5" y1="17" x2="12" y2="17" stroke="#4a6cf7" stroke-width="0.8" opacity="0.6"/>
    
    <!-- AI智能标识 - 神经网络节点 -->
    <g transform="translate(12, 2)">
      <!-- 中心节点 -->
      <circle cx="4" cy="4" r="1.2" fill="#fbbf24" stroke="#f59e0b" stroke-width="0.3"/>
      
      <!-- 周围节点 -->
      <circle cx="1" cy="2" r="0.6" fill="#60a5fa" opacity="0.8"/>
      <circle cx="7" cy="2" r="0.6" fill="#60a5fa" opacity="0.8"/>
      <circle cx="1" cy="6" r="0.6" fill="#60a5fa" opacity="0.8"/>
      <circle cx="7" cy="6" r="0.6" fill="#60a5fa" opacity="0.8"/>
      
      <!-- 连接线 -->
      <line x1="2.8" y1="3.2" x2="1.6" y2="2.4" stroke="#60a5fa" stroke-width="0.4" opacity="0.6"/>
      <line x1="5.2" y1="3.2" x2="6.4" y2="2.4" stroke="#60a5fa" stroke-width="0.4" opacity="0.6"/>
      <line x1="2.8" y1="4.8" x2="1.6" y2="5.6" stroke="#60a5fa" stroke-width="0.4" opacity="0.6"/>
      <line x1="5.2" y1="4.8" x2="6.4" y2="5.6" stroke="#60a5fa" stroke-width="0.4" opacity="0.6"/>
    </g>
  </g>
  
  <!-- 搜索/查询图标 -->
  <g transform="translate(26, 26)">
    <circle cx="4" cy="4" r="3" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.9"/>
    <line x1="6.5" y1="6.5" x2="9" y2="9" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
  </g>
  
  <!-- 装饰性光点 -->
  <circle cx="8" cy="12" r="0.8" fill="#ffffff" opacity="0.3"/>
  <circle cx="32" cy="16" r="0.6" fill="#ffffff" opacity="0.4"/>
  <circle cx="12" cy="32" r="0.5" fill="#ffffff" opacity="0.2"/>
</svg>